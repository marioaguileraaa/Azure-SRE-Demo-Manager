name: Deploy Madrid API to Windows VM

on:
  push:
    branches:
      - main
    paths:
      - 'backend/madrid-parking-api/**'
      - '.github/workflows/deploy-madrid-api.yml'
  workflow_dispatch:

env:
  APP_DIR: C:\Apps\madrid-parking-api
  SERVICE_NAME: MadridParkingAPI
  VM_NAME: ${{ vars.MADRID_VM_NAME }}
  RESOURCE_GROUP: ${{ vars.MADRID_RESOURCE_GROUP }}

jobs:
  deploy:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create deployment package
        shell: powershell
        run: |
          # Create deployment zip
          Compress-Archive -Path "backend\madrid-parking-api\*" -DestinationPath "madrid-api.zip" -Force

      - name: Upload deployment package to VM
        shell: powershell
        run: |
          # Create temporary storage account or use existing one for file transfer
          # For now, we'll embed the deployment script with base64 encoded zip
          Write-Host "Preparing deployment script..."

      - name: Deploy to Madrid VM via Run Command
        shell: pwsh
        run: |
          # Create PowerShell deployment script
          $deployScript = @'
          # Stop existing service
          $serviceName = "${{ env.SERVICE_NAME }}"
          $appDir = "${{ env.APP_DIR }}"
          
          Write-Host "Stopping service if exists..."
          $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
          if ($service) {
            Stop-Service -Name $serviceName -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
          }
          
          # Create app directory
          Write-Host "Creating application directory..."
          if (-not (Test-Path $appDir)) {
            New-Item -ItemType Directory -Path $appDir -Force | Out-Null
          }
          
          # Download code from GitHub using git
          Write-Host "Downloading code from GitHub..."
          $tempDir = "$env:TEMP\sre-demo-${{ github.run_id }}"
          
          # Try git clone first
          if (Get-Command git -ErrorAction SilentlyContinue) {
            Write-Host "Using git to clone repository..."
            git clone --depth 1 --branch main https://github.com/${{ github.repository }}.git $tempDir
          } else {
            # Fallback: download and extract zip
            Write-Host "Git not found, using zip download..."
            $repoZip = "https://github.com/${{ github.repository }}/archive/main.zip"
            $tempZip = "$env:TEMP\repo-${{ github.run_id }}.zip"
            
            try {
              [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
              Invoke-WebRequest -Uri $repoZip -OutFile $tempZip -UseBasicParsing
              
              if (-not (Test-Path $tempZip)) {
                throw "Download failed: file not created"
              }
              
              Write-Host "Extracting archive..."
              Expand-Archive -Path $tempZip -DestinationPath $tempDir -Force
              Remove-Item $tempZip -Force
            } catch {
              Write-Host "Download failed: $_"
              exit 1
            }
          }
          
          # Copy Madrid API files
          Write-Host "Copying Madrid API files..."
          $repoName = "${{ github.repository }}".Split("/")[1]
          $sourcePath = Get-ChildItem -Path $tempDir -Directory | Select-Object -First 1
          $srcMadrid = Join-Path $sourcePath.FullName "backend\madrid-parking-api"
          
          if (-not (Test-Path $srcMadrid)) {
            Write-Host "ERROR: Madrid API source not found at $srcMadrid"
            exit 1
          }
          
          Copy-Item -Path "$srcMadrid\*" -Destination $appDir -Recurse -Force
          Remove-Item $tempDir -Recurse -Force
          
          # Install dependencies
          Write-Host "Installing dependencies..."
          cd $appDir
          npm ci --only=production
          
          # Create .env file
          Write-Host "Creating .env file..."
          @"
          PORT=3002
          PARKING_NAME=Madrid Centro Parking
          PARKING_CITY=Madrid
          PARKING_LOCATION=Plaza Mayor, Madrid
          EVENT_LOG_SOURCE=MadridParkingAPI
          EVENT_LOG_NAME=Application
          NODE_ENV=production
          "@ | Out-File -FilePath "$appDir\.env" -Encoding UTF8
          
          # Install Windows Event Log source
          Write-Host "Installing Windows Event Log source..."
          npm run install-windows
          
          # Install or update Windows service
          $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
          if (-not $service) {
            Write-Host "Installing Windows service..."
            npm install -g node-windows
            
            $serviceScript = @"
          const Service = require('node-windows').Service;
          const svc = new Service({
            name: '$serviceName',
            description: 'Madrid Parking API',
            script: '$appDir\\server.js',
            workingDirectory: '$appDir',
            env: [{ name: 'NODE_ENV', value: 'production' }, { name: 'PORT', value: '3002' }]
          });
          svc.on('install', () => { console.log('Installed'); svc.start(); });
          svc.install();
          "@
            $serviceScript | Out-File -FilePath "$appDir\install-service.js" -Encoding UTF8
            node "$appDir\install-service.js"
            Start-Sleep -Seconds 10
          } else {
            Write-Host "Starting existing service..."
            Start-Service -Name $serviceName
          }
          
          # Verify
          Start-Sleep -Seconds 5
          $service = Get-Service -Name $serviceName
          if ($service.Status -eq 'Running') {
            Write-Host "✅ Service is running"
          } else {
            Write-Host "❌ Service failed to start"
            exit 1
          }
          '@
          
          # Save script to temp file
          $scriptPath = "$env:TEMP\deploy-madrid-${{ github.run_id }}.ps1"
          $deployScript | Out-File -FilePath $scriptPath -Encoding UTF8
          
          # Execute script on VM using Run Command
          Write-Host "Deploying to VM ${{ env.VM_NAME }}..."
          az vm run-command invoke `
            --name ${{ env.VM_NAME }} `
            --resource-group ${{ env.RESOURCE_GROUP }} `
            --command-id RunPowerShellScript `
            --scripts @$scriptPath
          
          # Clean up
          Remove-Item $scriptPath -Force

      - name: Deployment summary
        run: |
          echo "### Deployment Successful! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **VM**: ${{ env.VM_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
