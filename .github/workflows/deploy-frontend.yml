name: Deploy Frontend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/parking-manager/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  RESOURCE_GROUP: ${{ vars.FRONTEND_RESOURCE_GROUP }}
  NODE_VERSION: '18.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/parking-manager/package-lock.json

      - name: Install dependencies
        working-directory: frontend/parking-manager
        run: npm ci

      - name: Build application
        working-directory: frontend/parking-manager
        run: |
          # Create production build
          npm run build
          
          # Copy static files for Azure App Service
          cp -r build ../build-output

      - name: Create deployment package
        working-directory: frontend
        run: |
          # Create a zip file for deployment
          cd build-output
          zip -r ../deployment.zip .

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure App Service settings (pre-deploy)
        uses: azure/CLI@v1
        with:
          inlineScript: |
            # Set Node version
            az webapp config set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --linux-fx-version "NODE|${{ env.NODE_VERSION }}"
            
            # Configure startup command for static site
            az webapp config set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --startup-file "pm2 serve /home/site/wwwroot --no-daemon --spa"
            
            # Set environment variables and disable Oryx during zip deploy
            az webapp config appsettings set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --settings \
                WEBSITE_NODE_DEFAULT_VERSION="${{ env.NODE_VERSION }}" \
                SCM_DO_BUILD_DURING_DEPLOYMENT=false

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ env.RESOURCE_GROUP }}
          package: frontend/deployment.zip

      - name: Configure App Service settings (post-deploy)
        uses: azure/CLI@v1
        with:
          inlineScript: |
            # Re-apply settings post deploy (idempotent safety)
            az webapp config set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --linux-fx-version "NODE|${{ env.NODE_VERSION }}"
            az webapp config set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --startup-file "pm2 serve /home/site/wwwroot --no-daemon --spa"
            az webapp config appsettings set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --settings \
                WEBSITE_NODE_DEFAULT_VERSION="${{ env.NODE_VERSION }}" \
                SCM_DO_BUILD_DURING_DEPLOYMENT=false

      - name: Restart App Service
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az webapp restart \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Verify deployment
        run: |
          echo "Waiting for app to restart..."
          sleep 30
          
          APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          
          if curl -f -s -o /dev/null -w "%{http_code}" "$APP_URL" | grep -q "200"; then
            echo "✅ Frontend is accessible"
          else
            echo "⚠️  Frontend may still be starting up"
          fi

      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment Successful! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App Service**: ${{ env.AZURE_WEBAPP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
          echo "- **Node Version**: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 [Open Application](https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net)" >> $GITHUB_STEP_SUMMARY
