name: Deploy Madrid API to Windows VM

on:
  push:
    branches:
      - main
    paths:
      - 'backend/madrid-parking-api/**'
      - '.github/workflows/deploy-madrid-api.yml'
  workflow_dispatch:

env:
  APP_DIR: C:\Apps\madrid-parking-api
  SERVICE_NAME: MadridParkingAPI
  VM_NAME: ${{ vars.MADRID_VM_NAME }}
  RESOURCE_GROUP: ${{ vars.MADRID_RESOURCE_GROUP }}
  STORAGE_ACCOUNT: ${{ vars.DEPLOYMENT_STORAGE_ACCOUNT }}
  STORAGE_RG: ${{ vars.HUB_RESOURCE_GROUP }}

jobs:
  deploy:
    runs-on: parking-hub-runner-windows
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create deployment package
        shell: pwsh
        run: |
          # Create zip of Madrid API
          Write-Host "Creating deployment package..."
          Compress-Archive -Path "backend\madrid-parking-api\*" -DestinationPath "madrid-api-${{ github.run_id }}.zip" -Force

      - name: Deploy to Madrid VM via Run Command
        shell: pwsh
        run: |
          # Get VM private IP for direct transfer
          Write-Host "Getting VM private IP..."
          $vmPrivateIp = az vm show `
            --name ${{ env.VM_NAME }} `
            --resource-group ${{ env.RESOURCE_GROUP }} `
            --query "privateIps" `
            -o tsv
          
          Write-Host "VM Private IP: $vmPrivateIp"
          
          # Start temporary HTTP server on runner to serve the package
          Write-Host "Starting temporary web server on runner..."
          $serverJob = Start-Job -ScriptBlock {
            param($port, $zipPath)
            Set-Location (Split-Path $zipPath)
            python -m http.server $port
          } -ArgumentList 8765, "$PWD\madrid-api-${{ github.run_id }}.zip"
          
          Start-Sleep -Seconds 3
          
          # Get runner's private IP (from subnet)
          $runnerIp = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.IPAddress -like "10.0.4.*" }).IPAddress
          Write-Host "Runner IP in VNet: $runnerIp"
          
          # Create deployment script that downloads from runner
          $deployScript = @"
          `$serviceName = '${{ env.SERVICE_NAME }}'
          `$appDir = '${{ env.APP_DIR }}'
          `$runnerUrl = 'http://${runnerIp}:8765/madrid-api-${{ github.run_id }}.zip'
          
          Write-Host "Stopping service if exists..."
          `$service = Get-Service -Name `$serviceName -ErrorAction SilentlyContinue
          if (`$service) {
            Stop-Service -Name `$serviceName -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
          }
          
          Write-Host "Creating application directory..."
          if (-not (Test-Path `$appDir)) {
            New-Item -ItemType Directory -Path `$appDir -Force | Out-Null
          }
          
          Write-Host "Downloading package from runner at `$runnerUrl..."
          `$tempZip = "`$env:TEMP\madrid-api.zip"
          
          try {
            Invoke-WebRequest -Uri `$runnerUrl -OutFile `$tempZip -UseBasicParsing -TimeoutSec 60
            
            Write-Host "Extracting package..."
            `$tempExtract = "`$env:TEMP\madrid-extract"
            if (Test-Path `$tempExtract) {
              Remove-Item `$tempExtract -Recurse -Force
            }
            Expand-Archive -Path `$tempZip -DestinationPath `$tempExtract -Force
            
            Write-Host "Copying application files..."
            Copy-Item -Path "`$tempExtract\*" -Destination `$appDir -Recurse -Force
            
            Remove-Item `$tempZip -Force
            Remove-Item `$tempExtract -Recurse -Force
          } catch {
            Write-Host "ERROR: `$_"
            exit 1
          }
          
          Write-Host "Installing dependencies..."
          cd `$appDir
          npm ci --only=production
          
          Write-Host "Creating .env file..."
          @'
          PORT=3002
          PARKING_NAME=Madrid Centro Parking
          PARKING_CITY=Madrid
          PARKING_LOCATION=Plaza Mayor, Madrid
          EVENT_LOG_SOURCE=MadridParkingAPI
          EVENT_LOG_NAME=Application
          NODE_ENV=production
          '@ | Out-File -FilePath "`$appDir\.env" -Encoding UTF8
          
          Write-Host "Installing Windows Event Log source..."
          npm run install-windows
          
          `$service = Get-Service -Name `$serviceName -ErrorAction SilentlyContinue
          if (-not `$service) {
            Write-Host "Installing Windows service..."
            npm install -g node-windows
            
            `$serviceScript = @'
          const Service = require('node-windows').Service;
          const svc = new Service({
            name: '${{ env.SERVICE_NAME }}',
            description: 'Madrid Parking API',
            script: '${{ env.APP_DIR }}\\server.js',
            workingDirectory: '${{ env.APP_DIR }}',
            env: [{ name: 'NODE_ENV', value: 'production' }, { name: 'PORT', value: '3002' }]
          });
          svc.on('install', () => { console.log('Installed'); svc.start(); });
          svc.install();
          '@
            `$serviceScript | Out-File -FilePath "`$appDir\install-service.js" -Encoding UTF8
            node "`$appDir\install-service.js"
            Start-Sleep -Seconds 10
          } else {
            Write-Host "Starting existing service..."
            Start-Service -Name `$serviceName
          }
          
          Start-Sleep -Seconds 5
          `$service = Get-Service -Name `$serviceName
          if (`$service.Status -eq 'Running') {
            Write-Host "✅ Service is running"
          } else {
            Write-Host "❌ Service failed to start"
            exit 1
          }
          "@
          
          # Save deployment script to file
          $scriptPath = "$env:TEMP\deploy-madrid-${{ github.run_id }}.ps1"
          $deployScript | Out-File -FilePath $scriptPath -Encoding UTF8
          
          Write-Host "Deploying to VM ${{ env.VM_NAME }}..."
          Write-Host "VM will download package directly from runner via private network..."
          
          try {
            # Execute script on VM
            az vm run-command invoke `
              --name ${{ env.VM_NAME }} `
              --resource-group ${{ env.RESOURCE_GROUP }} `
              --command-id RunPowerShellScript `
              --scripts @$scriptPath
          } finally {
            # Stop web server and cleanup
            Write-Host "Stopping web server..."
            Stop-Job -Job $serverJob
            Remove-Job -Job $serverJob
            Remove-Item $scriptPath -Force -ErrorAction SilentlyContinue
          }

      - name: Deployment summary
        run: |
          echo "### Deployment Successful! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **VM**: ${{ env.VM_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Method**: Direct transfer from runner to VM (no storage account)" >> $GITHUB_STEP_SUMMARY
