name: Deploy Madrid API to Windows VM

on:
  push:
    branches:
      - main
    paths:
      - 'backend/madrid-parking-api/**'
      - '.github/workflows/deploy-madrid-api.yml'
  workflow_dispatch:

env:
  APP_DIR: C:\Apps\madrid-parking-api
  SERVICE_NAME: MadridParkingAPI
  VM_NAME: ${{ vars.MADRID_VM_NAME }}
  RESOURCE_GROUP: ${{ vars.MADRID_RESOURCE_GROUP }}
  STORAGE_ACCOUNT: ${{ vars.DEPLOYMENT_STORAGE_ACCOUNT }}
  STORAGE_RG: ${{ vars.HUB_RESOURCE_GROUP }}

jobs:
  deploy:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create deployment package
        shell: pwsh
        run: |
          # Create zip of Madrid API
          Write-Host "Creating deployment package..."
          Compress-Archive -Path "backend\madrid-parking-api\*" -DestinationPath "madrid-api-${{ github.run_id }}.zip" -Force

      - name: Upload deployment package to storage
        shell: pwsh
        run: |
          Write-Host "Enabling temporary key access for upload..."
          az storage account update `
            --name $env:STORAGE_ACCOUNT `
            --resource-group $env:STORAGE_RG `
            --allow-shared-key-access true `
            --only-show-errors
          
          # Get storage key
          $storageKey = (az storage account keys list -n $env:STORAGE_ACCOUNT -g $env:STORAGE_RG --query "[0].value" -o tsv)
          
          Write-Host "Uploading package to storage account..."
          az storage blob upload `
            --account-name $env:STORAGE_ACCOUNT `
            --account-key $storageKey `
            --container-name "deployments" `
            --file "madrid-api-${{ github.run_id }}.zip" `
            --name "madrid-api-deploy-${{ github.run_id }}.zip"
          
          # Generate SAS URL (valid for 30 minutes)
          $blobUrl = az storage blob generate-sas `
            --account-name $env:STORAGE_ACCOUNT `
            --account-key $storageKey `
            --container-name "deployments" `
            --name "madrid-api-deploy-${{ github.run_id }}.zip" `
            --expiry (Get-Date).AddMinutes(30).ToString("yyyy-MM-ddTHH:mm:ssZ") `
            --permissions r `
            -o tsv
          
          $fullBlobUrl = "https://$($env:STORAGE_ACCOUNT).blob.core.windows.net/deployments/madrid-api-deploy-${{ github.run_id }}.zip?$blobUrl"
          "BLOB_URL=$fullBlobUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Package uploaded successfully"

      - name: Deploy to Madrid VM via Run Command
        shell: pwsh
        run: |
          # Create PowerShell deployment script
          $deployScript = @'
          # Stop existing service
          $serviceName = "${{ env.SERVICE_NAME }}"
          $appDir = "${{ env.APP_DIR }}"
          
          Write-Host "Stopping service if exists..."
          $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
          if ($service) {
            Stop-Service -Name $serviceName -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
          }
          
          # Create app directory
          Write-Host "Creating application directory..."
          if (-not (Test-Path $appDir)) {
            New-Item -ItemType Directory -Path $appDir -Force | Out-Null
          }
          
          # Download code from storage using SAS URL
          Write-Host "Downloading deployment package..."
          $blobUrl = "${{ env.BLOB_URL }}"
          $tempZip = "$env:TEMP\madrid-api.zip"
          
          try {
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
            
            # Download using SAS URL (no auth needed - URL is pre-signed)
            Invoke-WebRequest -Uri $blobUrl `
              -OutFile $tempZip `
              -UseBasicParsing
            
            if (-not (Test-Path $tempZip)) {
              throw "Download failed - file not created"
            }
            
            Write-Host "Extracting package..."
            $tempExtract = "$env:TEMP\madrid-extract"
            Expand-Archive -Path $tempZip -DestinationPath $tempExtract -Force
            
            # Copy files
            Write-Host "Copying application files..."
            Copy-Item -Path "$tempExtract\*" -Destination $appDir -Recurse -Force
            
            # Clean up
            Remove-Item $tempZip -Force
            Remove-Item $tempExtract -Recurse -Force
          } catch {
            Write-Host "ERROR: $_"
            exit 1
          }
          
          # Install dependencies
          Write-Host "Installing dependencies..."
          cd $appDir
          npm ci --only=production
          
          # Create .env file
          Write-Host "Creating .env file..."
          @"
          PORT=3002
          PARKING_NAME=Madrid Centro Parking
          PARKING_CITY=Madrid
          PARKING_LOCATION=Plaza Mayor, Madrid
          EVENT_LOG_SOURCE=MadridParkingAPI
          EVENT_LOG_NAME=Application
          NODE_ENV=production
          "@ | Out-File -FilePath "$appDir\.env" -Encoding UTF8
          
          # Install Windows Event Log source
          Write-Host "Installing Windows Event Log source..."
          npm run install-windows
          
          # Install or update Windows service
          $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
          if (-not $service) {
            Write-Host "Installing Windows service..."
            npm install -g node-windows
            
            $serviceScript = @"
          const Service = require('node-windows').Service;
          const svc = new Service({
            name: '$serviceName',
            description: 'Madrid Parking API',
            script: '$appDir\\server.js',
            workingDirectory: '$appDir',
            env: [{ name: 'NODE_ENV', value: 'production' }, { name: 'PORT', value: '3002' }]
          });
          svc.on('install', () => { console.log('Installed'); svc.start(); });
          svc.install();
          "@
            $serviceScript | Out-File -FilePath "$appDir\install-service.js" -Encoding UTF8
            node "$appDir\install-service.js"
            Start-Sleep -Seconds 10
          } else {
            Write-Host "Starting existing service..."
            Start-Service -Name $serviceName
          }
          
          # Verify
          Start-Sleep -Seconds 5
          $service = Get-Service -Name $serviceName
          if ($service.Status -eq 'Running') {
            Write-Host "✅ Service is running"
          } else {
            Write-Host "❌ Service failed to start"
            exit 1
          }
          '@
          
          # Save script to temp file
          $scriptPath = "$env:TEMP\deploy-madrid-${{ github.run_id }}.ps1"
          $deployScript | Out-File -FilePath $scriptPath -Encoding UTF8
          
          # Execute script on VM using Run Command
          Write-Host "Deploying to VM ${{ env.VM_NAME }}..."
          az vm run-command invoke `
            --name ${{ env.VM_NAME }} `
            --resource-group ${{ env.RESOURCE_GROUP }} `
            --command-id RunPowerShellScript `
            --scripts @$scriptPath
          
          # Clean up local script
          Remove-Item $scriptPath -Force

      - name: Cleanup deployment package
        if: always()
        shell: pwsh
        run: |
          Write-Host "Cleaning up deployment package from storage..."
          $storageKey = (az storage account keys list -n $env:STORAGE_ACCOUNT -g $env:STORAGE_RG --query "[0].value" -o tsv 2>$null)
          
          if ($storageKey) {
            az storage blob delete `
              --account-name $env:STORAGE_ACCOUNT `
              --account-key $storageKey `
              --container-name "deployments" `
              --name "madrid-api-deploy-${{ github.run_id }}.zip" `
              --only-show-errors 2>$null
          }
          
          Write-Host "Disabling key access..."
          az storage account update `
            --name $env:STORAGE_ACCOUNT `
            --resource-group $env:STORAGE_RG `
            --allow-shared-key-access false `
            --only-show-errors
          
          Write-Host "✅ Cleanup complete"

      - name: Deployment summary
        run: |
          echo "### Deployment Successful! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **VM**: ${{ env.VM_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
