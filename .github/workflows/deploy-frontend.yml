name: Deploy Frontend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/parking-manager/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  RESOURCE_GROUP: ${{ vars.FRONTEND_RESOURCE_GROUP }}
  NODE_VERSION: '18.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/parking-manager/package-lock.json

      - name: Install dependencies
        working-directory: frontend/parking-manager
        run: npm install

      - name: Build application
        working-directory: frontend/parking-manager
        env:
          REACT_APP_LISBON_API_URL: ${{ vars.LISBON_API_URL }}
          REACT_APP_MADRID_API_URL: ${{ vars.MADRID_API_URL }}
          REACT_APP_PARIS_API_URL: ${{ vars.PARIS_API_URL }}
        run: |
          # Create production build with API URLs
          npm run build
          
          # Verify React build completed
          if [ ! -d "build" ]; then
            echo "ERROR: React build failed - no build directory found"
            exit 1
          fi
          
          # Create and populate deployment directory
          mkdir -p deployment-pkg
          
          # Copy React static files to deployment/build (Express serves from here)
          cp -r build deployment-pkg/
          
          # Copy Express server and dependencies to deployment root
          cp server.js deployment-pkg/
          cp package.json deployment-pkg/
          cp package-lock.json deployment-pkg/
          
          # DO NOT include node_modules (too large)
          # DO NOT include .deployment file (let Oryx run npm install)
          
          # Verify critical files exist before packaging
          echo "=== Deployment package contents ==="
          ls -la deployment-pkg/
          test -f deployment-pkg/server.js || (echo "ERROR: server.js missing" && exit 1)
          test -f deployment-pkg/package.json || (echo "ERROR: package.json missing" && exit 1)
          test -d deployment-pkg/build || (echo "ERROR: build directory missing" && exit 1)
          echo "✅ All files present"

      - name: Create deployment package
        working-directory: frontend/parking-manager
        run: |
          # Create zip from deployment-pkg directory
          cd deployment-pkg
          zip -r ../deployment.zip . -x "*.git*"
          echo "=== Deployment zip created ==="
          cd ..
          ls -lh deployment.zip
          
          # Verify zip contents
          echo "=== Zip contents preview ==="
          unzip -l deployment.zip | head -20

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure App Service settings (pre-deploy)
        uses: azure/CLI@v1
        with:
          inlineScript: |
            # Set Node version
            az webapp config set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --linux-fx-version "NODE|${{ env.NODE_VERSION }}"
            
            # Configure startup command for Express proxy server
            az webapp config set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --startup-file "node server.js"
            
            # Set environment variables
            # Let Oryx run npm install but skip React build (build/ already exists)
            az webapp config appsettings set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --settings \
                WEBSITE_NODE_DEFAULT_VERSION="${{ env.NODE_VERSION }}" \
                SCM_DO_BUILD_DURING_DEPLOYMENT=true \
                ENABLE_ORYX_BUILD=true \
                WEBSITE_RUN_FROM_PACKAGE=0
            
            # Restart to apply settings
            az webapp restart \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }}
            
            # Wait for restart
            sleep 10

      - name: Deploy to Azure App Service
        uses: azure/CLI@v1
        timeout-minutes: 3
        continue-on-error: true
        with:
          inlineScript: |
            echo "Deploying package to App Service..."
            az webapp deploy \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --src-path frontend/parking-manager/deployment.zip \
              --type zip \
              --async true
            
            echo "✅ Deployment initiated"
      
      - name: Post-deployment info
        run: |
          echo "⚠️  Note: Deployment may timeout in logs but succeeds in Azure"
          echo "📋 Verify: Azure Portal > App Service > Deployment Center"
          echo "🌐 URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "⏱️  Wait ~30-60 seconds after workflow completes for app to start"

      - name: Configure App Service settings (post-deploy)
        uses: azure/CLI@v1
        with:
          inlineScript: |
            # Re-apply settings post deploy (idempotent safety)
            az webapp config set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --linux-fx-version "NODE|${{ env.NODE_VERSION }}"
            # IMPORTANT: Use Express proxy server, NOT static file server
            az webapp config set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --startup-file "node server.js"
            az webapp config appsettings set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --settings \
                WEBSITE_NODE_DEFAULT_VERSION="${{ env.NODE_VERSION }}" \
                SCM_DO_BUILD_DURING_DEPLOYMENT=true \
                ENABLE_ORYX_BUILD=true \
                WEBSITE_RUN_FROM_PACKAGE=0

      - name: Restart App Service
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az webapp restart \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Verify deployment
        run: |
          echo "Waiting for app to restart..."
          sleep 30
          
          APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          
          if curl -f -s -o /dev/null -w "%{http_code}" "$APP_URL" | grep -q "200"; then
            echo "✅ Frontend is accessible"
          else
            echo "⚠️  Frontend may still be starting up"
          fi

      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment Successful! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App Service**: ${{ env.AZURE_WEBAPP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
          echo "- **Node Version**: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 [Open Application](https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net)" >> $GITHUB_STEP_SUMMARY
