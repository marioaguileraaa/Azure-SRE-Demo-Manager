name: Deploy Lisbon Chaos Alerts

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/modules/lisbon-chaos-alerts.bicep'
      - '.github/workflows/deploy-lisbon-chaos-alerts.yml'
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region for alert rules (e.g., swedencentral)'
        required: true
        type: string
        default: 'swedencentral'
      enabled:
        description: 'Enable alerts after deployment'
        required: true
        type: boolean
        default: true
      evaluationFrequency:
        description: 'Query evaluation frequency (ISO8601 duration)'
        required: true
        type: string
        default: 'PT5M'
      windowSize:
        description: 'Query lookback window (ISO8601 duration)'
        required: true
        type: string
        default: 'PT5M'
      namePrefix:
        description: 'Alert rule name prefix'
        required: true
        type: string
        default: 'lisbon-chaos'

env:
  HUB_RESOURCE_GROUP: ${{ vars.HUB_RESOURCE_GROUP }}
  LOG_ANALYTICS_WORKSPACE_RESOURCE_ID: ${{ vars.LOG_ANALYTICS_WORKSPACE_RESOURCE_ID }}
  ACTION_GROUP_RESOURCE_ID: ${{ vars.ACTION_GROUP_RESOURCE_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate required variables
        run: |
          if [ -z "${{ env.HUB_RESOURCE_GROUP }}" ]; then
            echo "❌ Missing GitHub variable: HUB_RESOURCE_GROUP"
            exit 1
          fi

          if [ -z "${{ env.LOG_ANALYTICS_WORKSPACE_RESOURCE_ID }}" ]; then
            echo "❌ Missing GitHub variable: LOG_ANALYTICS_WORKSPACE_RESOURCE_ID"
            exit 1
          fi

          if [[ "${{ env.LOG_ANALYTICS_WORKSPACE_RESOURCE_ID }}" != /subscriptions/* ]]; then
            echo "❌ LOG_ANALYTICS_WORKSPACE_RESOURCE_ID must be a fully qualified ARM resource ID starting with '/subscriptions/'"
            echo "   Got: ${{ env.LOG_ANALYTICS_WORKSPACE_RESOURCE_ID }}"
            echo "   Expected format: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.OperationalInsights/workspaces/{workspaceName}"
            echo "   Note: Do not use the Log Analytics workspace customer ID (GUID). Use the full ARM resource ID."
            exit 1
          fi

          echo "✅ Required variables are present"

      - name: Deploy Lisbon chaos alerts
        run: |
          az deployment group create \
            --resource-group "${{ env.HUB_RESOURCE_GROUP }}" \
            --template-file infrastructure/modules/lisbon-chaos-alerts.bicep \
            --parameters \
              location="${{ inputs.location || 'swedencentral' }}" \
              logAnalyticsWorkspaceId="${{ env.LOG_ANALYTICS_WORKSPACE_RESOURCE_ID }}" \
              actionGroupResourceId="${{ env.ACTION_GROUP_RESOURCE_ID }}" \
              enabled="${{ inputs.enabled || 'true' }}" \
              evaluationFrequency="${{ inputs.evaluationFrequency || 'PT5M' }}" \
              windowSize="${{ inputs.windowSize || 'PT5M' }}" \
              namePrefix="${{ inputs.namePrefix || 'lisbon-chaos' }}"

      - name: Deployment summary
        run: |
          echo "### Lisbon Chaos Alerts Deployment Successful ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Template**: infrastructure/modules/lisbon-chaos-alerts.bicep" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.HUB_RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Location**: ${{ inputs.location || 'swedencentral' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Enabled**: ${{ inputs.enabled || 'true' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Evaluation Frequency**: ${{ inputs.evaluationFrequency || 'PT5M' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Window Size**: ${{ inputs.windowSize || 'PT5M' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Name Prefix**: ${{ inputs.namePrefix || 'lisbon-chaos' }}" >> $GITHUB_STEP_SUMMARY
