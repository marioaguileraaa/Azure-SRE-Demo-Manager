name: Deploy Madrid API to Windows VM

on:
  push:
    branches:
      - main
    paths:
      - 'backend/madrid-parking-api/**'
      - '.github/workflows/deploy-madrid-api.yml'
  workflow_dispatch:

env:
  APP_DIR: C:\Apps\madrid-parking-api
  SERVICE_NAME: MadridParkingAPI

jobs:
  deploy:
    runs-on: [self-hosted, windows, madrid-vm]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Stop existing service
        shell: powershell
        run: |
          try {
            $service = Get-Service -Name "${{ env.SERVICE_NAME }}" -ErrorAction SilentlyContinue
            if ($service) {
              Write-Host "Stopping service ${{ env.SERVICE_NAME }}..."
              Stop-Service -Name "${{ env.SERVICE_NAME }}" -Force -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 3
            }
          } catch {
            Write-Host "Service not found or already stopped"
          }

      - name: Create application directory
        shell: powershell
        run: |
          if (-not (Test-Path "${{ env.APP_DIR }}")) {
            New-Item -ItemType Directory -Path "${{ env.APP_DIR }}" -Force
          }

      - name: Copy application files
        shell: powershell
        run: |
          Copy-Item -Path "backend\madrid-parking-api\*" -Destination "${{ env.APP_DIR }}" -Recurse -Force

      - name: Install dependencies
        shell: powershell
        working-directory: ${{ env.APP_DIR }}
        run: |
          Write-Host "Installing production dependencies..."
          npm ci --only=production

      - name: Create .env file
        shell: powershell
        working-directory: ${{ env.APP_DIR }}
        run: |
          @"
          PORT=3002
          PARKING_NAME=Madrid Centro Parking
          PARKING_CITY=Madrid
          PARKING_LOCATION=Plaza Mayor, Madrid
          EVENT_LOG_SOURCE=MadridParkingAPI
          EVENT_LOG_NAME=Application
          NODE_ENV=production
          "@ | Out-File -FilePath .env -Encoding UTF8

      - name: Install Windows Event Log source
        shell: powershell
        working-directory: ${{ env.APP_DIR }}
        run: |
          Write-Host "Installing Windows Event Log source..."
          npm run install-windows

      - name: Install/Update Windows Service
        shell: powershell
        working-directory: ${{ env.APP_DIR }}
        run: |
          # Check if service exists
          $service = Get-Service -Name "${{ env.SERVICE_NAME }}" -ErrorAction SilentlyContinue
          
          if ($service) {
            Write-Host "Service exists, updating..."
          } else {
            Write-Host "Creating new Windows service..."
            
            # Install node-windows-service helper script
            $setupScript = @"
          const Service = require('node-windows').Service;
          
          const svc = new Service({
            name: '${{ env.SERVICE_NAME }}',
            description: 'Madrid Parking API - Manages parking information for Madrid',
            script: '${{ env.APP_DIR }}\\server.js',
            nodeOptions: [],
            workingDirectory: '${{ env.APP_DIR }}',
            env: [
              {
                name: 'NODE_ENV',
                value: 'production'
              },
              {
                name: 'PORT',
                value: '3002'
              }
            ]
          });
          
          svc.on('install', function() {
            console.log('Service installed successfully');
            svc.start();
          });
          
          svc.on('alreadyinstalled', function() {
            console.log('Service already installed');
          });
          
          svc.install();
          "@
            
            $setupScript | Out-File -FilePath "install-service.js" -Encoding UTF8
            node install-service.js
            Start-Sleep -Seconds 5
          }

      - name: Start service
        shell: powershell
        run: |
          Write-Host "Starting service ${{ env.SERVICE_NAME }}..."
          Start-Service -Name "${{ env.SERVICE_NAME }}"
          Start-Sleep -Seconds 5

      - name: Verify deployment
        shell: powershell
        run: |
          $service = Get-Service -Name "${{ env.SERVICE_NAME }}"
          
          if ($service.Status -eq 'Running') {
            Write-Host "✅ Service is running"
            
            # Test the API
            Start-Sleep -Seconds 5
            try {
              $response = Invoke-RestMethod -Uri "http://localhost:3002/health" -TimeoutSec 10
              if ($response.status -eq 'healthy') {
                Write-Host "✅ API health check passed"
                Write-Host "Response: $($response | ConvertTo-Json)"
              } else {
                Write-Host "❌ API health check failed - unexpected status"
                exit 1
              }
            } catch {
              Write-Host "❌ API health check failed - $_"
              Write-Host "Checking Event Log for errors..."
              Get-EventLog -LogName Application -Source "${{ env.SERVICE_NAME }}" -Newest 10 -ErrorAction SilentlyContinue
              exit 1
            }
          } else {
            Write-Host "❌ Service failed to start. Status: $($service.Status)"
            Get-EventLog -LogName Application -Source "${{ env.SERVICE_NAME }}" -Newest 10 -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Deployment summary
        if: success()
        shell: powershell
        run: |
          $hostname = $env:COMPUTERNAME
          $ip = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object {$_.InterfaceAlias -notlike "*Loopback*"} | Select-Object -First 1).IPAddress
          
          $summary = @"
          ### Deployment Successful! 🚀
          
          - **Service**: ${{ env.SERVICE_NAME }}
          - **Directory**: ${{ env.APP_DIR }}
          - **API URL**: http://${ip}:3002
          - **Commit**: ${{ github.sha }}
          
          #### Service Status
          ``````
          $(Get-Service -Name "${{ env.SERVICE_NAME }}" | Format-Table -AutoSize | Out-String)
          ``````
          "@
          
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
