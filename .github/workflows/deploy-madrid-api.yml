name: Deploy Madrid API to Windows VM

on:
  push:
    branches:
      - main
    paths:
      - 'backend/madrid-parking-api/**'
      - '.github/workflows/deploy-madrid-api.yml'
  workflow_dispatch:

env:
  APP_DIR: C:\Apps\madrid-parking-api
  SERVICE_NAME: MadridParkingAPI
  VM_NAME: ${{ vars.MADRID_VM_NAME }}
  RESOURCE_GROUP: ${{ vars.MADRID_RESOURCE_GROUP }}
  STORAGE_ACCOUNT: ${{ vars.DEPLOYMENT_STORAGE_ACCOUNT }}
  STORAGE_RG: ${{ vars.HUB_RESOURCE_GROUP }}

jobs:
  deploy:
    runs-on: parking-hub-runner-windows
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Debug - Show current principal
        shell: pwsh
        run: |
          $account = az account show -o json | ConvertFrom-Json
          $principal = $account.user.name
          Write-Host "Service Principal: $($principal.Substring(0, [Math]::Min(8, $principal.Length)))..."
          Write-Host "Full details - user.name will be the service principal ID"
          Write-Host "To see the actual ID: check GitHub secret AZURE_CREDENTIALS and look at clientId field"

      - name: Create deployment package
        shell: pwsh
        run: |
          Write-Host "Creating deployment package..."
          Compress-Archive -Path "backend\madrid-parking-api\*" -DestinationPath "madrid-api-${{ github.run_id }}.zip" -Force

      - name: Upload to storage via private endpoint
        shell: pwsh
        run: |
          Write-Host "Uploading to deployment storage via private endpoint..."
          az storage blob upload `
            --account-name $env:STORAGE_ACCOUNT `
            --container-name "deployments" `
            --file "madrid-api-${{ github.run_id }}.zip" `
            --name "madrid-api-${{ github.run_id }}.zip" `
            --auth-mode login `
            --overwrite
          
          Write-Host "Generating SAS token (RBAC-based, valid 30 min)..."
          $sasToken = az storage blob generate-sas `
            --account-name $env:STORAGE_ACCOUNT `
            --container-name "deployments" `
            --name "madrid-api-${{ github.run_id }}.zip" `
            --expiry (Get-Date).AddMinutes(30).ToString("yyyy-MM-ddTHH:mm:ssZ") `
            --permissions r `
            --auth-mode login `
            --as-user `
            -o tsv
          
          $blobUrl = "https://$($env:STORAGE_ACCOUNT).blob.core.windows.net/deployments/madrid-api-${{ github.run_id }}.zip?$sasToken"
          "BLOB_URL=$blobUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Deploy to Madrid VM via Run Command
        shell: pwsh
        run: |
          $deployScript = @'
          $serviceName = "${{ env.SERVICE_NAME }}"
          $appDir = "${{ env.APP_DIR }}"
          $blobUrl = "${{ env.BLOB_URL }}"
          
          Write-Host "Stopping service if exists..."
          $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
          if ($service) {
            Stop-Service -Name $serviceName -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
          }
          
          Write-Host "Creating application directory..."
          if (-not (Test-Path $appDir)) {
            New-Item -ItemType Directory -Path $appDir -Force | Out-Null
          }
          
          Write-Host "Downloading from storage via private endpoint..."
          $tempZip = "$env:TEMP\madrid-api.zip"
          
          try {
            Invoke-WebRequest -Uri $blobUrl -OutFile $tempZip -UseBasicParsing
            
            Write-Host "Extracting package..."
            $tempExtract = "$env:TEMP\madrid-extract"
            if (Test-Path $tempExtract) { Remove-Item $tempExtract -Recurse -Force }
            Expand-Archive -Path $tempZip -DestinationPath $tempExtract -Force
            
            Write-Host "Copying files..."
            Copy-Item -Path "$tempExtract\*" -Destination $appDir -Recurse -Force
            
            Remove-Item $tempZip -Force
            Remove-Item $tempExtract -Recurse -Force
          } catch {
            Write-Host "ERROR: $_"
            exit 1
          }
          
          Write-Host "Installing dependencies..."
          cd $appDir
          npm ci --only=production
          
          Write-Host "Creating .env file..."
          @"
          PORT=3002
          PARKING_NAME=Madrid Centro Parking
          PARKING_CITY=Madrid
          PARKING_LOCATION=Plaza Mayor, Madrid
          EVENT_LOG_SOURCE=MadridParkingAPI
          EVENT_LOG_NAME=Application
          NODE_ENV=production
          "@ | Out-File -FilePath "$appDir\.env" -Encoding UTF8
          
          Write-Host "Installing Windows Event Log source..."
          npm run install-windows
          
          $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
          if (-not $service) {
            Write-Host "Installing Windows service..."
            npm install -g node-windows
            
            $serviceScript = @"
          const Service = require('node-windows').Service;
          const svc = new Service({
            name: '${{ env.SERVICE_NAME }}',
            description: 'Madrid Parking API',
            script: '${{ env.APP_DIR }}\\server.js',
            workingDirectory: '${{ env.APP_DIR }}',
            env: [{ name: 'NODE_ENV', value: 'production' }, { name: 'PORT', value: '3002' }]
          });
          svc.on('install', () => { console.log('Installed'); svc.start(); });
          svc.install();
          "@
            $serviceScript | Out-File -FilePath "$appDir\install-service.js" -Encoding UTF8
            node "$appDir\install-service.js"
            Start-Sleep -Seconds 10
          } else {
            Write-Host "Starting service..."
            Start-Service -Name $serviceName
          }
          
          Start-Sleep -Seconds 5
          $service = Get-Service -Name $serviceName
          if ($service.Status -eq 'Running') {
            Write-Host "✅ Service is running"
            exit 0
          } else {
            Write-Host "❌ Service failed to start"
            exit 1
          }
          '@
          
          Write-Host "Deploying to VM ${{ env.VM_NAME }}..."
          $scriptPath = "$env:TEMP\deploy-${{ github.run_id }}.ps1"
          $deployScript | Out-File -FilePath $scriptPath -Encoding UTF8
          
          $result = az vm run-command invoke `
            --name ${{ env.VM_NAME }} `
            --resource-group ${{ env.RESOURCE_GROUP }} `
            --command-id RunPowerShellScript `
            --scripts @$scriptPath `
            -o json | ConvertFrom-Json
          
          Remove-Item $scriptPath -Force
          
          # Check for errors in output
          $stdout = $result.value | Where-Object { $_.code -eq 'ComponentStatus/StdOut/succeeded' }
          $stderr = $result.value | Where-Object { $_.code -eq 'ComponentStatus/StdErr/succeeded' }
          
          Write-Host "=== STDOUT ==="
          Write-Host $stdout.message
          if ($stderr.message) {
            Write-Host "=== STDERR ==="
            Write-Host $stderr.message
          }
          
          # Fail if deployment script failed
          if ($stdout.message -match '❌' -or $stdout.message -match 'ERROR:') {
            Write-Host "Deployment failed!"
            exit 1
          }
          
          Write-Host "✅ Deployment successful"

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          az storage blob delete `
            --account-name $env:STORAGE_ACCOUNT `
            --container-name "deployments" `
            --name "madrid-api-${{ github.run_id }}.zip" `
            --auth-mode login

      - name: Deployment summary
        run: |
          echo "### Deployment Successful! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **VM**: ${{ env.VM_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Method**: Direct transfer from runner to VM (no storage account)" >> $GITHUB_STEP_SUMMARY
